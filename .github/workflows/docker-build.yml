name: Build & Push Docker Image (Docker Hub)

on:
  push:
    branches: [ "main" ]
    paths:
      #- "src/**"
      - "deploy/**"
      - "Dockerfile"

env:
  IMAGE_NAME: astro-pinwheel
  NAMESPACE: default
  DEPLOYMENT_NAME: astro-pinwheel

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest
  
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ☸️ Setup kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # 🔑 kubeconfig
      - name: Set kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

      # 🔍 Verify cluster
      - name: Check cluster
        run: kubectl get nodes

      # 📦 Apply manifests
      - name: Apply base manifests
        run: |
          kubectl apply -n $NAMESPACE -f deploy/deployment.yaml

      # 🚀 Deploy new image
      - name: Deploy new version
        run: |
          IMAGE="${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"

          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
            astro-pinwheel=${IMAGE} \
            -n $NAMESPACE

      # ⏳ Wait rollout
      - name: Wait for rollout (with auto rollback)
        run: |
          if ! kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} -n $NAMESPACE --timeout=180s; then
            echo "❌ Rollout failed → rolling back"
            kubectl rollout undo deployment/${{ env.DEPLOYMENT_NAME }} -n $NAMESPACE
            exit 1
          fi
          
      # ❗ Verify deployment
      - name: Verify deployment
        run: |
          kubectl get deployment ${{ env.DEPLOYMENT_NAME }} -n $NAMESPACE
          kubectl get pods -l app=${{ env.DEPLOYMENT_NAME }} -n $NAMESPACE
